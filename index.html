<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEEVO To-Do App</title>
<style>
body { font-family: Arial,sans-serif; background:#1c1c1c; color:#f5f5f5; display:flex; justify-content:center; align-items:center; height:100vh; }
.container { background:#2c2c2c; padding:30px; border-radius:10px; width:350px; }
h2 { color:#ffd700; text-align:center; }
input, button { width:100%; padding:10px; margin:5px 0; border-radius:5px; border:none; }
input { background:#1c1c1c; color:#f5f5f5; }
button { background:#ffd700; color:#1c1c1c; font-weight:bold; cursor:pointer; }
ul { list-style:none; padding:0; }
li { padding:10px; margin:5px 0; background:#121212; border-radius:5px; display:flex; justify-content:space-between; align-items:center; }
li.completed { text-decoration:line-through; color:#888; }
li button { background:red; color:#fff; width:50px; }
</style>
</head>
<body>
<div class="container">
<h2>To-Do App</h2>
<input type="text" id="taskInput" placeholder="Add new task...">
<button id="addBtn">Add Task</button>
<ul id="taskList"></ul>
</div>
<script>
const taskInput=document.getElementById('taskInput');
const addBtn=document.getElementById('addBtn');
const taskList=document.getElementById('taskList');

function saveTasks(){ localStorage.setItem('tasks', taskList.innerHTML); }
function loadTasks(){ if(localStorage.getItem('tasks')) taskList.innerHTML=localStorage.getItem('tasks'); }
function createTask(taskText){
  const li=document.createElement('li');
  li.innerHTML=`<span>${taskText}</span><button>Delete</button>`;
  li.querySelector('span').addEventListener('click',()=>{ li.classList.toggle('completed'); saveTasks(); });
  li.querySelector('button').addEventListener('click',()=>{ li.remove(); saveTasks(); });
  taskList.appendChild(li);
  saveTasks();
}

addBtn.addEventListener('click',()=>{ if(taskInput.value.trim()!==''){ createTask(taskInput.value); taskInput.value=''; } });
taskInput.addEventListener('keypress',e=>{ if(e.key==='Enter' && taskInput.value.trim()!==''){ createTask(taskInput.value); taskInput.value=''; } });
loadTasks();
</script>
</body>
</html>
